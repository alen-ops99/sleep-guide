site_name: Vodič za poremećaje spavanja u PZZ
site_description: Praktični vodič za liječnike obiteljske medicine — prepoznavanje, probir i trijaža poremećaja spavanja
site_author: Alen Juginović, dr. med.
site_url: ""

theme:
  name: material
  custom_dir: docs/overrides
  language: hr
  palette:
    - scheme: default
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Tamni način
    - scheme: slate
      primary: custom
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Svijetli način
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.tabs.link
    - toc.follow
    - toc.integrate
  icon:
    logo: material/sleep

nav:
  - Početna: index.md
  - Brzi probir spavanja: screening/interactive-screening.md
  - Interaktivni upitnici:
    - Epworthova ljestvica pospanosti (ESS): questionnaires/ess-interactive.md
    - STOP-BANG — probir apneje u snu: questionnaires/stop-bang-interactive.md
    - Indeks težine nesanice (ISI): questionnaires/isi-interactive.md
    - Ljestvica nemirnih nogu (IRLS): questionnaires/irls-interactive.md
    - Probir REM poremećaja ponašanja (RBDSQ): questionnaires/rbdsq-interactive.md
  - Poglavlja:
    - Uvod — O vodiču: guide/00-uvod.md
    - Nesanica: guide/01-nesanica.md
    - Opstruktivna apneja u snu: guide/02-osa.md
    - Sindrom nemirnih nogu i PLMD: guide/03-rls-plmd.md
    - REM poremećaj ponašanja u snu: guide/04-rbd.md
    - NREM parasomnije: guide/05-nrem-parasomnias.md
    - Narkolepsija: guide/06-narkolepsija.md
    - Idiopatska hipersomnija: guide/07-idiopatska-hipersomnija.md
    - Cirkadijani poremećaji: guide/08-cirkadijani-poremecaji.md
    - Bruksizam u snu: guide/09-bruksizam.md
    - Nedovoljan san: guide/10-nedovoljan-san.md
    - Poremećaj noćnih mora: guide/11-poremecaj-nocnih-mora.md
    - Poremećaj jedenja u snu (SRED): guide/12-sred.md
    - Centralna apneja u snu: guide/13-centralna-apneja.md
  - Alati:
    - Upitnik za pacijente: screening/patient-questions-hr.md
    - Klinički dijagrami toka: screening/clinical-flowchart.md
    - Algoritmi bodovanja: screening/scoring-algorithms.md
    - Dnevnik spavanja: screening/dnevnik-spavanja.md
    - Predložak uputnice: screening/predlozak-uputnice.md
  - Upitnici (tiskovna verzija):
    - Epworthova ljestvica pospanosti (ESS): questionnaires/ess-hr.md
    - STOP-BANG (apneja u snu): questionnaires/stop-bang-hr.md
    - Indeks težine nesanice (ISI): questionnaires/isi-hr.md
    - Ljestvica nemirnih nogu (IRLS): questionnaires/irls-hr.md
    - Probir REM poremećaja ponašanja (RBDSQ): questionnaires/rbdsq-hr.md
  - Reference: guide/14-reference.md

extra_css:
  - stylesheets/custom.css
  - stylesheets/screening.css

extra:
  social: []

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: hr
