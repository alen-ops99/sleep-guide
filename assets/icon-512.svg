  </g>
  <text x="256" y="445" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="36" font-weight="700" fill="#fafafa" opacity="0.9">Spavanje u HR</text>
  <text x="256" y="480" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="22" fill="#fafafa" opacity="0.6">Klinički vodič</text>
